epochs: 10
lr: 0.001
weight_decay: 0.0

grad_clip: null   # max gradient norm for clipping; null disables
amp: true         # mixed precision; only active when a CUDA device is available
resume: false     # resume from checkpoint_dir/last.pt if it exists

scheduler:
  name: cosine    # one of: none, cosine, step
  step_size: 10   # StepLR: epochs between LR decays
  gamma: 0.1      # StepLR: multiplicative decay factor

checkpoint_dir: checkpoints
log_dir: runs
